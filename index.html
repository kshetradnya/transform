<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform - Premium Photo Editor</title>
  <meta name="description" content="AI-powered cinematic photo editing platform">
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body class="dark-theme">
  <!-- Fluid Cursor -->
  <div id="cursor-glow"></div>
  <div id="cursor-dot"></div>

  <!-- Main Application Wrapper -->
  <div class="app-wrapper">
    
    <!-- Top Bar -->
    <header class="top-bar glass-panel">
      <div class="logo">
        <div class="logo-icon"></div>
        <h1>Transform</h1>
      </div>
      <div class="top-actions">
        <button id="btn-undo" class="icon-btn magnetic"><i class="ri-arrow-go-back-line"></i></button>
        <button id="btn-redo" class="icon-btn magnetic"><i class="ri-arrow-go-forward-line"></i></button>
        <div class="divider"></div>
        <button id="btn-compare" class="text-btn magnetic">Original</button>
        <button id="btn-export" class="primary-btn magnetic">Export <i class="ri-download-line"></i></button>
      </div>
    </header>

    <!-- Main Workspace -->
    <div class="workspace">
      
      <!-- Left Sidebar: Tools (30 Features) -->
      <aside class="sidebar-left glass-panel styled-scroll">
        <div class="sidebar-header">
          <h2>Adjustments</h2>
          <div class="tabs">
            <button class="tab active" data-target="basic">Basic</button>
            <button class="tab" data-target="color">Color</button>
            <button class="tab" data-target="detail">Detail</button>
            <button class="tab" data-target="fx">FX</button>
          </div>
        </div>
        
        <div class="sidebar-content" id="tools-container">
          <!-- Tools will be injected here by JS -->
        </div>
      </aside>

      <!-- Center: Canvas & Image -->
      <main class="canvas-area">
        <div class="upload-overlay active" id="upload-overlay">
          <div class="upload-box magnetic">
            <i class="ri-image-add-line"></i>
            <h3>Drop your photo here</h3>
            <p>or click to browse</p>
            <input type="file" id="file-upload" accept="image/jpeg, image/png, image/webp" hidden>
            <button class="secondary-btn" onclick="document.getElementById('file-upload').click()">Browse Files</button>
          </div>
        </div>
        
        <div class="canvas-container" id="canvas-container" style="display: none;">
          <canvas id="main-canvas"></canvas>
          <!-- Grid Overlay for cropping etc. -->
          <div class="grid-overlay" id="grid-overlay"></div>
        </div>
        
        <!-- Bottom Toolbar (Crop, Rotate, etc.) -->
        <div class="bottom-toolbar glass-panel" id="bottom-toolbar" style="display: none;">
          <button class="icon-btn tooltip active" data-tip="Move"><i class="ri-drag-move-fill"></i></button>
          <button class="icon-btn tooltip" data-tip="Crop"><i class="ri-crop-line"></i></button>
          <button class="icon-btn tooltip" data-tip="Rotate L"><i class="ri-anticlockwise-2-line"></i></button>
          <button class="icon-btn tooltip" data-tip="Rotate R"><i class="ri-clockwise-line"></i></button>
          <button class="icon-btn tooltip" data-tip="Flip H"><i class="ri-flip-horizontal-line"></i></button>
          <button class="icon-btn tooltip" data-tip="Flip V"><i class="ri-flip-vertical-line"></i></button>
          <div class="divider"></div>
          <button class="icon-btn tooltip zoom-out" data-tip="Zoom Out"><i class="ri-zoom-out-line"></i></button>
          <span class="zoom-level">100%</span>
          <button class="icon-btn tooltip zoom-in" data-tip="Zoom In"><i class="ri-zoom-in-line"></i></button>
          <button class="icon-btn tooltip fit-screen" data-tip="Fit Screen"><i class="ri-fullscreen-line"></i></button>
        </div>
      </main>

      <!-- Right Sidebar: Templates (60 Filters) & AI Mode -->
      <aside class="sidebar-right glass-panel styled-scroll">
        <div class="sidebar-header">
          <div class="mode-toggle">
            <button class="toggle-btn active" data-mode="templates">Library</button>
            <button class="toggle-btn ai-glow" data-mode="ai">AI Mode <i class="ri-sparkling-fill"></i></button>
          </div>
        </div>
        
        <!-- Templates Panel -->
        <div class="sidebar-content" id="templates-panel">
          <div class="search-bar">
            <i class="ri-search-line"></i>
            <input type="text" id="template-search" placeholder="Search 60+ Cinematic Looks...">
          </div>
          <div class="categories styled-scroll-x" id="template-categories">
            <!-- Categories injected by JS -->
          </div>
          <div class="templates-grid" id="templates-grid">
            <!-- Preset cards injected by JS -->
          </div>
        </div>

        <!-- AI Panel -->
        <div class="sidebar-content" id="ai-panel" style="display: none;">
          <div class="ai-header">
            <div class="ai-avatar">
              <i class="ri-robot-2-fill"></i>
            </div>
            <div class="ai-title">
              <h3>Transform AI</h3>
              <p>Your creative assistant</p>
            </div>
          </div>
          
          <div class="chat-container styled-scroll" id="chat-history">
            <div class="chat-message ai">
              <p>Hi! I can suggest settings, apply specific moods, or fix lighting. Upload a photo and tell me what you're looking for! (e.g. "Make it look like a moody cyberpunk movie")</p>
            </div>
          </div>
          
          <div class="chat-input-area">
            <div class="chat-suggestions" id="ai-suggestions">
              <button class="suggestion-chip">"Moody Evening"</button>
              <button class="suggestion-chip">"Fix Contrast"</button>
              <button class="suggestion-chip">"Ghibli Sky"</button>
            </div>
            <div class="input-wrapper">
              <input type="text" id="ai-input" placeholder="Describe the look...">
              <button id="ai-send" class="icon-btn ai-send-btn"><i class="ri-send-plane-fill"></i></button>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </div>

  <div id="toast-container"></div>

  <!-- Scripts -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
